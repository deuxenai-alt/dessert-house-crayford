<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Checkout — Just Desserts Crayford</title>
<meta name="description" content="Your Just Desserts basket — choose delivery or collection, add a coupon, and place your order. Open every evening 3pm to 11:30pm.">
<meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Viaoda+Libre&family=Cinzel:wght@500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/site.css?v=2">
</head>
<body data-page="book" data-base="../">

<div id="nav-mount"></div>

<section class="chero">
  <div class="hero-photo" aria-hidden="true" style="background-image:url('https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=2880&q=85')"></div>
  <div class="hero-scrim" aria-hidden="true"></div>
  <div class="hero-grain" aria-hidden="true"></div>
  <div class="chero-inner">
    <p class="eyebrow">Checkout</p>
    <h1>Your order, <em>nearly there.</em></h1>
    <p class="chero-sub">Review your basket, choose a collection time, and tell us how to reach you. Pay on collection — cash or card in store.</p>
  </div>
</section>

<section class="book-wrap">
  <div class="wrap">
    <div id="book-banner"></div>
    <div class="book-card">
      <div id="book-root">
        <!-- Checkout flow is rendered here by checkout.js -->
        <div class="slots-loading"><span class="spin" aria-hidden="true"></span><span>Loading your order…</span></div>
      </div>
    </div>
  </div>
</section>

<div id="hours-mount"></div>
<div id="visit-mount"></div>
<div id="footer-mount"></div>

<script src="../assets/data.js?v=2"></script>
<script src="../assets/app.js?v=2"></script>
<script src="../assets/cart.js?v=2"></script>
<script src="../assets/checkout.js?v=2"></script>
</body>
</html>
